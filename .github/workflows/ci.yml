name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ShellCheck and shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -fsSL -o /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.12.0/shfmt_v3.12.0_linux_amd64
          sudo install -m 0755 /tmp/shfmt /usr/local/bin/shfmt
      - name: Bash syntax
        run: bash -n release.sh ss-rust.sh scripts/security-scan.sh
      - name: ShellCheck
        run: shellcheck -e SC2059 -x release.sh ss-rust.sh scripts/security-scan.sh
      - name: Secret scan
        run: bash scripts/security-scan.sh
